# config/settings.yaml
# Central config — import via src/config.py

project:
  name: road-risk-analysis
  version: "0.1.0"

geography:
  pilot_region: yorkshire
  # Police force codes as used in the STATS19 collision CSV (police_force field).
  # Source: DfT data guide Excel, sheet '2024_code_list', filter field name = 'police_force'
  # To verify or update:
  #   import pandas as pd
  #   df = pd.read_excel('dft-road-casualty-statistics-...-data-guide-2024.xlsx',
  #                      sheet_name='2024_code_list')
  #   print(df[df['field name']=='police_force'][['code/format','label']])
  # NOTE: codes 4-7 are Lancashire/Merseyside/Greater Manchester/Cheshire — NOT Yorkshire.
  # Yorkshire forces are 12-16 as listed below.
  police_force_codes:
    north_yorkshire:  12
    west_yorkshire:   13
    south_yorkshire:  14
    humberside:       16

years:
  full_range: [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024]
  pre_covid:  [2015, 2016, 2017, 2018, 2019]
  covid:      [2020, 2021]
  post_covid: [2022, 2023, 2024]
  recent:     [2024]                    # for single-year analyses

paths:
  raw:
    stats19:    data/raw/stats19/
    aadf:       data/raw/aadf/
    shapefiles: data/raw/shapefiles/
    webtris:    data/raw/webtris/
  processed:    data/processed/
  features:     data/features/

webtris:
  base_url: "https://webtris.highwaysengland.co.uk/api/v1"
  report_type: daily
  page_size: 100                        # max results per API page

stats19:
  # Columns to keep at each join stage (trim memory)
  collision_cols:
    - collision_index
    - date
    - time
    - police_force
    - collision_severity
    - number_of_vehicles
    - number_of_casualties
    - road_type
    - speed_limit
    - junction_detail
    - light_conditions
    - weather_conditions
    - road_surface_conditions
    - urban_or_rural_area
    - latitude
    - longitude
    - local_authority_highway
  vehicle_cols:
    - collision_index
    - vehicle_reference
    - vehicle_type
    - vehicle_manoeuvre
    - vehicle_location_restricted_lane
    - skidding_and_overturning
    - age_of_driver
    - age_of_vehicle
    - engine_capacity_cc
  casualty_cols:
    - collision_index
    - vehicle_reference
    - casualty_reference
    - casualty_class
    - sex_of_casualty
    - age_of_casualty
    - casualty_severity
    - casualty_type

model:
  target: collision_severity            # 1=fatal, 2=serious, 3=slight
  test_size: 0.2
  random_state: 42
  cv_folds: 5